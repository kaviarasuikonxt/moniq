name: Build and Deploy Moniq API to Azure

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build with Maven
        run: mvn -B clean package -DskipTests

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: app-moniq-dev-kp
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: target/*.jar

      - name: Show effective pom contains oauth2-client
        run: mvn -q help:effective-pom | grep -i "spring-boot-starter-oauth2-client" || true

      - name: Show dependency tree
        run: mvn -q dependency:tree | grep -i "oauth2-client" || true
        