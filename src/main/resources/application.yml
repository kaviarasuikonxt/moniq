server:
  port: 8888

spring:
  application:
    name: moniq-api

  datasource:
    url: jdbc:postgresql://localhost:5432/moniq
    username: postgres
    password: admin123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

jwt:
  secret: moniq-secret-key-change-later
  expiration: 86400000
