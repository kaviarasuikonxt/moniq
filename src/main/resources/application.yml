server:
  port: 8888

spring:
  application:
    name: moniq-api

  servlet:
    multipart:
      max-file-size: ${SPRING_MULTIPART_MAX_FILE_SIZE:15MB}
      max-request-size: ${SPRING_MULTIPART_MAX_REQUEST_SIZE:15MB}

  datasource:
    url: jdbc:postgresql://localhost:5432/moniq
    username: postgres
    password: admin123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

# ✅ Use ONLY this app.jwt section going forward
app:
  jwt:
    issuer: moniq
    exp-minutes: ${JWT_EXP_MINUTES:60}
    secret: ${JWT_SECRET:moniq-prod-jwt-secret-please-change-2026-03-04-abcdefghijklmnopqrstuvwxyz-1234567890}
    access-ttl-seconds: ${JWT_ACCESS_TTL_SECONDS:900} # 15 minutes
    refresh-ttl-seconds: ${JWT_REFRESH_TTL_SECONDS:604800} # 7 days
    refresh-hash-secret: ${JWT_REFRESH_HASH_SECRET:${JWT_SECRET:moniq-secret-local-dev-change}}

  ai:
    enabled: ${APP_AI_ENABLED:false}
  ocr:
    worker:
      enabled: ${APP_OCR_WORKER_ENABLED:false} # local false, prod true
      poll-interval-ms: ${APP_OCR_WORKER_POLL_INTERVAL_MS:2000}
      visibility-timeout-seconds: ${APP_OCR_WORKER_VISIBILITY_TIMEOUT_SECONDS:60}
    vision:
      poll-delay-ms: ${APP_OCR_VISION_POLL_DELAY_MS:800}
      max-wait-ms: ${APP_OCR_VISION_MAX_WAIT_MS:30000}

  auth:
    frontend-callback: ${FRONTEND_URL:http://localhost:3000}/auth/callback
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
    #google:
    # enabled: true

  receipts:
    max-file-bytes: ${APP_RECEIPTS_MAX_FILE_BYTES:10485760} # 10MB default
    sas-ttl-minutes: ${APP_RECEIPTS_SAS_TTL_MINUTES:60}
    public-base-url: ${APP_RECEIPTS_PUBLIC_BASE_URL:} # optional (if you set public container/CDN)

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:}
            client-secret: ${GOOGLE_CLIENT_SECRET:}
            scope: openid,profile,email

logging:
  level:
    root: INFO
    com.moniq.api: DEBUG
    org.springframework.web: DEBUG
    org.springframework.web.multipart: DEBUG

storage:
  connection-string: ${AZURE_STORAGE_CONNECTION_STRING:}
  container-receipts: ${AZURE_STORAGE_CONTAINER_RECEIPTS:receipts}
  queue-receipt-ocr: ${AZURE_STORAGE_QUEUE_RECEIPT_OCR:receipt-ocr}
azure:
  vision:
    endpoint: ${AZURE_VISION_ENDPOINT:}
    key: ${AZURE_VISION_KEY:}
moniq:
  parsing:
    merchants:
      ustar:
        multiline: true
        pattern: PRICE_QTY_TOTAL
