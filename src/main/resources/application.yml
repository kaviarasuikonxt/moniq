server:
  port: 8888

spring:
  application:
    name: moniq-api

  datasource:
    url: jdbc:postgresql://localhost:5432/moniq
    username: postgres
    password: admin123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

# ✅ Use ONLY this app.jwt section going forward
app:
  jwt:
    issuer: moniq
    secret: ${JWT_SECRET:moniq-secret-local-dev-change}
    access-ttl-seconds: ${JWT_ACCESS_TTL_SECONDS:900} # 15 minutes
    refresh-ttl-seconds: ${JWT_REFRESH_TTL_SECONDS:604800} # 7 days
    refresh-hash-secret: ${JWT_REFRESH_HASH_SECRET:${JWT_SECRET:moniq-secret-local-dev-change}}

  auth:
    frontend-callback: ${FRONTEND_URL:http://localhost:3000}/auth/callback
    google:
      enabled: true

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:}
            client-secret: ${GOOGLE_CLIENT_SECRET:}
            scope: openid,profile,email

logging:
  file:
    name: "" # disables file logging (console only)
